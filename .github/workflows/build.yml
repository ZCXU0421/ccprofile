name: Build Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: ccprofile.exe
          - os: macos-latest
            artifact: ccprofile
          - os: ubuntu-latest
            artifact: ccprofile

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyinstaller cryptography

      - name: Build
        run: python build.py

      - uses: actions/upload-artifact@v4
        with:
          name: ccprofile-${{ runner.os }}
          path: dist/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename for clarity and bundle installers
        run: |
          mkdir release
          cp artifacts/ccprofile-Windows/ccprofile.exe release/ccprofile-windows.exe
          cp artifacts/ccprofile-macOS/ccprofile release/ccprofile-macos
          cp artifacts/ccprofile-Linux/ccprofile release/ccprofile-linux
          chmod +x release/ccprofile-macos release/ccprofile-linux

          # Bundle installers (same script for both platforms)
          cp install.sh release/install-macos.sh
          cp install.sh release/install-linux.sh
          # Windows installer stays as-is (install.bat)
          cp install.bat release/install-windows.bat

      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
