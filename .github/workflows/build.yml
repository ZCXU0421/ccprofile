name: Build Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos-arm64
          - os: macos-13
            platform: macos-intel
          - os: ubuntu-22.04
            platform: linux

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyinstaller cryptography

      - name: Build
        run: python build.py

      - uses: actions/upload-artifact@v4
        with:
          name: ccprofile-${{ matrix.platform }}
          path: dist/ccprofile/**

  release:
    needs: build
    runs-on: ubuntu-latest
    if: always() && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package release assets and bundle installers
        run: |
          set -euo pipefail
          mkdir release
          mkdir -p staging

          package_tar() {
            platform="$1"
            src="artifacts/ccprofile-$platform"
            archive="release/ccprofile-$platform.tar.gz"

            if [ ! -f "$src/ccprofile" ]; then
              echo "Skipping $platform: missing executable"
              return
            fi

            rm -rf staging/ccprofile
            mkdir -p staging/ccprofile
            cp -R "$src"/. staging/ccprofile/
            chmod +x staging/ccprofile/ccprofile
            tar -C staging -czf "$archive" ccprofile
          }

          package_zip() {
            platform="$1"
            src="artifacts/ccprofile-$platform"
            archive="../release/ccprofile-$platform.zip"

            if [ ! -f "$src/ccprofile.exe" ]; then
              echo "Skipping $platform: missing executable"
              return
            fi

            rm -rf staging/ccprofile
            mkdir -p staging/ccprofile
            cp -R "$src"/. staging/ccprofile/
            (cd staging && zip -qr "$archive" ccprofile)
          }

          package_zip windows
          package_tar macos-arm64
          package_tar macos-intel
          package_tar linux

          # Bundle installers
          cp install.sh release/install-macos.sh
          cp install.sh release/install-linux.sh
          cp install.bat release/install-windows.bat

          # Publish checksums for installer-side verification
          (
            cd release
            find . -type f ! -name SHA256SUMS -printf '%P\0' \
              | sort -z \
              | xargs -0 sha256sum > SHA256SUMS
          )

      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
