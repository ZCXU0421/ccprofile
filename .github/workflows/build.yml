name: Build Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: ccprofile.exe
            platform: windows
          - os: macos-latest
            artifact: ccprofile
            platform: macos-arm64
          - os: macos-13
            artifact: ccprofile
            platform: macos-intel
          - os: ubuntu-22.04
            artifact: ccprofile
            platform: linux

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyinstaller cryptography

      - name: Build
        run: python build.py

      - uses: actions/upload-artifact@v4
        with:
          name: ccprofile-${{ matrix.platform }}
          path: dist/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: always() && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename for clarity and bundle installers
        run: |
          mkdir release

          # Windows
          if [ -f artifacts/ccprofile-windows/ccprofile.exe ]; then
            cp artifacts/ccprofile-windows/ccprofile.exe release/ccprofile-windows.exe
          fi

          # macOS ARM64
          if [ -f artifacts/ccprofile-macos-arm64/ccprofile ]; then
            cp artifacts/ccprofile-macos-arm64/ccprofile release/ccprofile-macos-arm64
            chmod +x release/ccprofile-macos-arm64
          fi

          # macOS Intel (optional, may not exist if runner unavailable)
          if [ -f artifacts/ccprofile-macos-intel/ccprofile ]; then
            cp artifacts/ccprofile-macos-intel/ccprofile release/ccprofile-macos-intel
            chmod +x release/ccprofile-macos-intel
          fi

          # Linux
          if [ -f artifacts/ccprofile-linux/ccprofile ]; then
            cp artifacts/ccprofile-linux/ccprofile release/ccprofile-linux
            chmod +x release/ccprofile-linux
          fi

          # Bundle installers
          cp install.sh release/install-macos.sh
          cp install.sh release/install-linux.sh
          cp install.bat release/install-windows.bat

          # Publish checksums for installer-side verification
          (
            cd release
            find . -type f ! -name SHA256SUMS -printf '%P\0' \
              | sort -z \
              | xargs -0 sha256sum > SHA256SUMS
          )

      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
